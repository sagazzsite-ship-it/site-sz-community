<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SZ COMMUNITY</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <button onclick="mudarAba('inicio')">INICIO</button>
        <button onclick="mudarAba('rankings')">RANKINGS</button>
        <button onclick="mudarAba('torneios')">TORNEIOS</button>
        <button onclick="mudarAba('regras')">REGRAS</button>
        <button onclick="mudarAba('sobre')">SOBRE NÓS</button>
    </nav>

    <div id="inicio" class="content-section">
        <div id="login-box">
            <h2>LOGIN DISCORD</h2>
            <input type="text" id="user-input" placeholder="Nome de Usuario">
            <button class="btn-sz" onclick="acaoLogin(event)">LOGAR</button>
        </div>
        <div id="user-profile" style="display:none;">
            <h3>Bem-vindo, <span id="display-username"></span></h3>
        </div>
    </div>

    <div id="torneios" class="content-section" style="display:none;">
        <div id="aba-inscricao">
            <button class="btn-sz-gold" onclick="participarTorneio()">INSCREVER-SE</button>
        </div>
        
        <div id="aba-grupo-espera" style="display:none;">
            <h2 id="status-live">AGUARDANDO INICIO</h2>
            <div id="group-controls">
                <button onclick="abrirModal('modal-criacao')">CRIAR GRUPO</button>
                <button onclick="abrirModal('modal-entrar')">ENTRAR EM GRUPO</button>
            </div>
            <div id="room-info" style="display:none;">
                <p id="room-code"></p>
            </div>
        </div>
    </div>

    <div id="rankings" class="content-section" style="display:none;"><h2>RANKINGS EM BREVE</h2></div>
    <div id="regras" class="content-section" style="display:none;"><h2>REGRAS DO CLAN</h2></div>
    <div id="sobre" class="content-section" style="display:none;"><h2>SOBRE A SZ COMMUNITY</h2></div>

    <div id="modal-criacao" class="modal" style="display:none;">
        <div class="modal-content">
            <p>NOME DO GRUPO (5 LETRAS)</p>
            <input type="text" id="group-name" maxlength="5">
            <button onclick="acaoCriarGrupo()">CRIAR</button>
        </div>
    </div>

    <footer>
        <p id="footer-nota">NOTA: CARREGANDO...</p>
    </footer>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
